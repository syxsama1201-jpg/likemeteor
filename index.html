<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Like Meteor</title>
<style>
  :root {
    --bg: #0a0a0a;
    --board-bg: #111111;
    --card-bg: #121212;
    --text-primary: #ffffff;
    --text-secondary: #aaaaaa;
    --border: rgba(255,255,255,0.08);
    --danger: #ff4d4d;
    --success: #4ade80;
    --accent: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg);
    color: var(--text-primary);
    padding: 24px;
    min-height: 100vh;
    overflow: hidden;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.6px;
    color: var(--text-primary);
  }

  .header-actions {
    display: flex;
    gap: 12px;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #f0f0f0;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.2);
  }

  /* 看板布局 */
  .board {
    display: flex;
    gap: 20px;
    height: calc(100vh - 120px);
    overflow-x: auto;
    padding-bottom: 20px;
  }

  .column {
    background: var(--board-bg);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    transition: flex 0.3s ease;
  }

  /* 栏目宽度比例分配 */
  .column[data-col="List"], 
  .column[data-col="Pending"], 
  .column[data-col="Team"] {
    flex: 1; /* 占 20% (1/5) */
    min-width: 200px;
  }

  .column[data-col="Idea"] {
    flex: 2; /* 占 40% (2/5) */
    min-width: 300px;
  }

  .column h3 {
    margin-bottom: 18px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .cards-container {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-right: 4px;
  }

  .add-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-secondary);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 8px;
    transition: all 0.25s ease;
  }

  .add-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.25);
  }

  /* 卡片样式 */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: 
      0 0 15px rgba(255,255,255,0.05),
      0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .drag-handle {
    cursor: grab;
    color: #444;
    font-size: 18px;
    user-select: none;
  }

  .title-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 15px;
    font-weight: 500;
    outline: none;
  }

  /* 详情内容区域 */
  .content-wrapper {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, margin-top 0.3s ease;
  }

  .card.expanded .content-wrapper {
    margin-top: 12px;
    /* 最长不超过两倍高度，通过 JS 动态计算并配合这里的 max-height 限制 */
    max-height: 200px; 
  }

  .content-input {
    width: 100%;
    min-height: 80px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    color: var(--text-primary);
    font-size: 13.5px;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    outline: none;
  }

  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .action-btn.toggle {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
  }

  .action-btn.archive {
    background: rgba(74, 222, 128, 0.08);
    color: var(--success);
  }

  .action-btn.complete {
    background: rgba(255, 77, 77, 0.08);
    color: var(--danger);
  }

  .action-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  /* 归档页 */
  #archive-view {
    display: none;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 24px;
    border: 1px solid var(--border);
    height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .archive-item {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
  }

  .archive-item h4 {
    margin-bottom: 8px;
  }

  .archive-item p {
    color: var(--text-secondary);
    font-size: 14px;
    white-space: pre-wrap;
  }

  .archive-meta {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
  }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

<div class="header">
  <h1 id="page-title">Like Meteor</h1>
  <div class="header-actions">
    <input type="file" id="import-input" style="display: none;" accept=".json" onchange="importData(event)">
    <button class="btn btn-secondary" onclick="triggerImport()">导入备份</button>
    <button class="btn btn-secondary" onclick="exportData()">导出备份</button>
    <button class="btn btn-primary" id="toggle-view-btn" onclick="toggleView()">已归档</button>
  </div>
</div>

<div class="board" id="board-view"></div>

<div id="archive-view">
  <div id="archive-list"></div>
</div>

<script>
  const COLUMNS = ['List', 'Pending', 'Team', 'Idea'];
  let tasks = JSON.parse(localStorage.getItem('kanban_data')) || [];
  let archivedTasks = JSON.parse(localStorage.getItem('kanban_archived_data')) || [];
  let isShowingArchive = false;

  function generateId() { 
    return Date.now().toString() + Math.floor(Math.random() * 1000).toString(); 
  }

  function saveData() {
    localStorage.setItem('kanban_data', JSON.stringify(tasks));
    localStorage.setItem('kanban_archived_data', JSON.stringify(archivedTasks));
  }

  function renderBoard() {
    const boardEl = document.getElementById('board-view');
    boardEl.innerHTML = '';

    COLUMNS.forEach(colName => {
      const colEl = document.createElement('div');
      colEl.className = 'column';
      colEl.dataset.col = colName;
      colEl.innerHTML = `
        <h3>${colName}</h3>
        <div class="cards-container" id="container-${colName}"></div>
        <button class="add-btn" onclick="addTask('${colName}')">A Nwe Work</button>
      `;
      boardEl.appendChild(colEl);

      const containerEl = colEl.querySelector('.cards-container');
      tasks.filter(t => t.column === colName).forEach(task => {
        containerEl.appendChild(createCardElement(task));
      });

      new Sortable(containerEl, {
        group: 'kanban',
        handle: '.drag-handle',
        animation: 150,
        onEnd: function (evt) {
          const taskId = evt.item.dataset.id;
          const newColName = evt.to.closest('.column').dataset.col;
          const task = tasks.find(t => t.id === taskId);
          if (task) {
            task.column = newColName;
            saveData();
          }
        }
      });
    });
  }

  function createCardElement(task) {
    const card = document.createElement('div');
    card.className = 'card';
    if (task.isExpanded) card.classList.add('expanded');
    card.dataset.id = task.id;

    card.innerHTML = `
      <div class="card-header">
        <span class="drag-handle">≡</span>
        <input type="text" class="title-input" value="${task.title || ''}" maxlength="16" placeholder="任务标题">
      </div>
      <div class="content-wrapper">
        <textarea class="content-input" placeholder="详细内容...">${task.content || ''}</textarea>
      </div>
      <div class="actions">
        <button class="action-btn toggle">${task.isExpanded ? '收起' : '详情'}</button>
        <button class="action-btn archive">归档</button>
        <button class="action-btn complete">删除</button>
      </div>
    `;

    const toggleBtn = card.querySelector('.toggle');
    const contentWrapper = card.querySelector('.content-wrapper');
    const contentInput = card.querySelector('.content-input');

    // 详情/收起切换逻辑
    toggleBtn.addEventListener('click', () => {
      const isExpanded = card.classList.toggle('expanded');
      task.isExpanded = isExpanded;
      toggleBtn.textContent = isExpanded ? '收起' : '详情';
      
      if (isExpanded) {
        // 自适应高度计算，限制最大高度
        contentWrapper.style.maxHeight = Math.min(contentInput.scrollHeight, 180) + 'px';
      } else {
        contentWrapper.style.maxHeight = '0';
      }
      saveData();
    });

    // 自动高度校准
    if (task.isExpanded) {
      setTimeout(() => {
        contentWrapper.style.maxHeight = Math.min(contentInput.scrollHeight, 180) + 'px';
      }, 0);
    }

    card.querySelector('.title-input').addEventListener('input', (e) => { 
      task.title = e.target.value; 
      saveData(); 
    });
    
    contentInput.addEventListener('input', (e) => { 
      task.content = e.target.value; 
      saveData();
      if (card.classList.contains('expanded')) {
        contentWrapper.style.maxHeight = Math.min(contentInput.scrollHeight, 180) + 'px';
      }
    });
    
    card.querySelector('.complete').addEventListener('click', () => {
      tasks = tasks.filter(t => t.id !== task.id);
      saveData();
      renderBoard();
    });

    card.querySelector('.archive').addEventListener('click', () => {
      task.archivedAt = new Date().toLocaleString('zh-CN');
      archivedTasks.push(task);
      tasks = tasks.filter(t => t.id !== task.id);
      saveData();
      renderBoard();
    });

    return card;
  }

  function addTask(columnName) {
    tasks.push({ id: generateId(), title: '', content: '', column: columnName, isExpanded: false });
    saveData();
    renderBoard();
  }

  function renderArchive() {
    const archiveList = document.getElementById('archive-list');
    archiveList.innerHTML = archivedTasks.length === 0 ? 
      '<p style="text-align:center; color:#444; margin-top:100px;">暂无数据</p>' : '';

    [...archivedTasks].reverse().forEach(task => {
      const item = document.createElement('div');
      item.className = 'archive-item';
      item.innerHTML = `
        <h4>${task.title || '未命名'}</h4>
        <p>${task.content || '无内容'}</p>
        <div class="archive-meta">时间: ${task.archivedAt} | 来源: ${task.column}</div>
      `;
      archiveList.appendChild(item);
    });
  }

  function toggleView() {
    isShowingArchive = !isShowingArchive;
    document.getElementById('board-view').style.display = isShowingArchive ? 'none' : 'flex';
    document.getElementById('archive-view').style.display = isShowingArchive ? 'block' : 'none';
    document.getElementById('toggle-view-btn').textContent = isShowingArchive ? '返回看板' : '已归档';
    if (isShowingArchive) renderArchive();
  }

  function exportData() {
    const dataStr = JSON.stringify({ tasks, archivedTasks }, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Meteor_Backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
  }

  function triggerImport() { document.getElementById('import-input').click(); }

  function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const imported = JSON.parse(e.target.result);
      tasks = imported.tasks || [];
      archivedTasks = imported.archivedTasks || [];
      saveData();
      renderBoard();
    };
    reader.readAsText(event.target.files[0]);
  }

  renderBoard();
</script>
</body>
</html>
